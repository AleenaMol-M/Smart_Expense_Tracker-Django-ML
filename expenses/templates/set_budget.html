{% extends 'base.html' %}

{% block content %}

<style>
    .page-title {
        font-weight: 700;
        margin-bottom: 20px;
    }

    .budget-card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        background: #fff;
        padding: 25px;
    }

    .form-label {
        font-weight: 600;
        margin-bottom: 6px;
    }

    input, select {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ced4da;
        transition: 0.3s;
    }

    input:focus, select:focus {
        outline: none;
        border-color: #0d6efd;
        box-shadow: 0 0 6px rgba(13,110,253,0.3);
    }

    .save-btn {
        background: #198754;
        color: white;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 10px;
        font-weight: 600;
        margin-top: 10px;
    }

    .save-btn:hover {
        background: #157347;
    }

    .helper-text {
        color: #6c757d;
        font-size: 14px;
        margin-bottom: 15px;
    }
</style>

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <h2 class="page-title text-center">💰 Set Monthly Budget</h2>

            <div class="budget-card">

                <p class="helper-text text-center">
                    Set your monthly spending limit to track expenses better 📊
                </p>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Budget Amount</label>
                        {{ form.amount }}
                    </div>

                    <button type="submit" class="save-btn">
                        Save Budget
                    </button>

                </form>

            </div>

        </div>
    </div>

</div>

{% endblock %}
