{% extends 'base.html' %}

{% block content %}

<style>
    .expense-card {
        border-radius: 18px;
        border: none;
    }

    .expense-header {
        background: linear-gradient(135deg, #9543f2, #c14df7);
        color: white;
        text-align: center;
        padding: 18px;
        border-top-left-radius: 18px;
        border-top-right-radius: 18px;
    }

    .expense-body {
        padding: 25px;
        background: #fff;
    }

    .expense-footer {
        background: #f8f9fa;
        text-align: center;
        padding: 12px;
        border-bottom-left-radius: 18px;
        border-bottom-right-radius: 18px;
    }

    label {
        font-weight: 600;
        margin-bottom: 6px;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ced4da;
        border-radius: 10px;
        transition: 0.3s;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #7d2eb1;
        box-shadow: 0 0 6px rgba(13, 110, 253, 0.3);
        outline: none;
    }

    .save-btn {
        background: #198754;
        color: white;
        padding: 12px;
        border: none;
        width: 100%;
        border-radius: 10px;
        font-size: 16px;
        transition: 0.3s;
    }

    .save-btn:hover {
        background: #157347;
    }

    .back-btn {
        display: inline-block;
        margin-top: 8px;
        font-size: 14px;
        color: #6c757d;
        text-decoration: none;
    }

    .back-btn:hover {
        color: #61176d;
    }
</style>

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg expense-card">

                <!-- Header -->
                <div class="expense-header">
                    <h3 class="mb-0">Add Expense</h3>
                </div>

                <!-- Body -->
                <div class="expense-body">

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label>Amount</label>
                            {{ form.amount }}
                        </div>

                        <div class="mb-3">
                            <label>Category</label>
                            {{ form.category }}
                        </div>

                        <div class="mb-3">
                            <label>Date</label>
                            {{ form.date }}
                        </div>

                        <div class="mb-3">
                            <label>Description</label>
                            {{ form.description }}
                        </div>

                        <button type="submit" class="save-btn">
                            Save Expense
                        </button>

                    </form>

                </div>

                <!-- Footer -->
                <div class="expense-footer">
                    <a href="{% url 'expense_list' %}" class="back-btn">
                        ← Back to List
                    </a>
                </div>

            </div>

        </div>
    </div>

</div>

{% endblock %}
