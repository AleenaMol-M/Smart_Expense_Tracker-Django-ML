<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Expense Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-100 via-white to-purple-50 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md">

        <!-- Logo / Title -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto bg-purple-600 rounded-full flex items-center justify-center text-white text-3xl shadow-lg">
                💰
            </div>

            <h1 class="mt-4 text-3xl font-bold text-gray-900">
                Smart Expense Tracker
            </h1>

            <p class="mt-2 text-gray-500">
                Welcome back! Login to continue.
            </p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-xl p-8">

            <form method="POST" class="space-y-5">
                {% csrf_token %}

                {{ form.as_p }}

                <button
                    type="submit"
                    class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-xl transition duration-300 shadow-md">
                    Login
                </button>
            </form>

            <div class="mt-6 text-center">

                <p class="text-gray-500">
                    Don't have an account?
                </p>

                <a href="{% url 'signup' %}"
                   class="text-purple-600 font-semibold hover:text-purple-800">
                    Create Account
                </a>

            </div>

        </div>

        <!-- Footer -->
        <p class="text-center text-gray-500 text-sm mt-6">
            © 2026 Smart Expense Tracker
        </p>

    </div>

</body>
</html>
