{% extends 'base.html' %}

{% block content %}

<style>
    .page-title {
        font-weight: 700;
        margin-bottom: 20px;
    }

    .summary-card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        padding: 20px;
        background: #ffffff;
        margin-bottom: 20px;
    }

    .expense-card {
        border: none;
        border-radius: 14px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.06);
        padding: 12px 16px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        background: #fff;
    }

    .amount {
        font-weight: 600;
        color: #0d6efd;
    }

    .highlight {
        font-weight: 600;
    }

    .danger {
        color: #c0392b;
    }

    .success {
        color: #198754;
    }

    .empty-box {
        text-align: center;
        padding: 15px;
        color: #6c757d;
    }
</style>

<div class="container py-4">

    <h2 class="page-title">📅 Today’s Expenses</h2>

    <!-- Summary Card -->
    <div class="summary-card">

        <h4>💰 Today’s Spending</h4>
        <h3 class="amount">₹{{ total }}</h3>

        <p class="mt-3">
            <strong>Average Daily Target:</strong>
            ₹{{ daily_target }}
        </p>

        <p class="highlight">
            {{ daily_message }}
        </p>

    </div>

    <!-- Expense List -->
    <div class="summary-card">

        <h5 class="mb-3">🧾 Expense List</h5>

        {% for e in expenses %}
            <div class="expense-card">
                <div>
                    <strong>{{ e.category }}</strong>
                </div>
                <div class="amount">
                    ₹{{ e.amount }}
                </div>
            </div>
        {% empty %}
            <div class="empty-box">
                No expenses today 🎉
            </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
