<html>
    <head><title>Daily expenses</title>
    <link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"></head>
    <body>
        <div class="container mt-4">
        <h2>📅 Today’s Expenses</h2>
        <h3>Today's Spending: Rs. {{ total }}</h3>

<p>
    Average Daily Target:
    Rs. {{ daily_target }}
</p>

<p>{{ daily_message }}</p>

{% for e in expenses %}
    <p>{{ e.category }} - ₹{{ e.amount }}</p>
{% empty %}
    <p>No expenses today</p>
{% endfor %}
</div>
    </body>
</html>
